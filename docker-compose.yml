services:
  postgres:
    image: postgres:16-alpine
    container_name: ranking-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ranking_game
      POSTGRES_USER: rankinggame
      POSTGRES_PASSWORD: rankinggame
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankinggame -d ranking_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: ranking_game_postgres_data
