services:
  postgres:
    image: quay.io/sclorg/postgresql-16-c9s:latest
    container_name: ranking-game-postgres
    restart: unless-stopped
    environment:
      POSTGRESQL_DATABASE: ranking_game
      POSTGRESQL_USER: rankinggame
      POSTGRESQL_PASSWORD: rankinggame
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/pgsql/data

volumes:
  postgres_data:
