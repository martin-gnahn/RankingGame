<mat-card appearance="outlined" class="action-card">
  <mat-card-header>
    <mat-card-title>{{ 'createRoom.title' | translate }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>{{ 'createRoom.playerName' | translate }}</mat-label>
        <input matInput formControlName="playerName" autocomplete="off" maxlength="32" value="Martin" />
        @if (form.controls.playerName.hasError('required')) {
          <mat-error>{{ 'createRoom.errors.nameRequired' | translate }}</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="disabled">
        @if (loading) {
          <mat-spinner diameter="18" />
        } @else {
          {{ 'createRoom.submit' | translate }}
        }
      </button>
    </form>
  </mat-card-content>
</mat-card>
