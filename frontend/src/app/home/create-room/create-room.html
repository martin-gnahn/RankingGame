<mat-card appearance="outlined" class="action-card">
  <mat-card-header>
    <mat-card-title>Raum erstellen</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>Dein Name</mat-label>
        <input matInput formControlName="playerName" autocomplete="off" maxlength="32" />
        @if (form.controls.playerName.hasError('required')) {
          <mat-error>Name fehlt</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="disabled">
        @if (loading) {
          <mat-spinner diameter="18" />
        } @else {
          Raum erstellen
        }
      </button>
    </form>
  </mat-card-content>
</mat-card>
