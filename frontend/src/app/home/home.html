<main class="home-shell">
  <section class="hero" aria-labelledby="home-title">
    <p class="eyebrow">Party Games</p>
    <h1 id="home-title">Ranking Game</h1>
    <p class="intro">
      Erstellt einen Raum, sammelt Antworten und sortiert gemeinsam die besten Rankings.
    </p>
  </section>

  <section class="room-actions" aria-label="Raumaktionen">
    <app-create-room
      [disabled]="pendingAction !== null"
      [loading]="pendingAction === 'create'"
      (createRoomRequested)="createRoom($event)"
    />

    <app-join-room
      [disabled]="pendingAction !== null"
      [loading]="pendingAction === 'join'"
      (joinRoomRequested)="joinRoom($event)"
    />

    @if (errorMessage) {
      <p class="form-error" role="alert">{{ errorMessage }}</p>
    }
  </section>
</main>
