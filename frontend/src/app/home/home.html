<main class="home-shell">
  <section class="hero" aria-labelledby="home-title">
    <p class="eyebrow">{{ 'home.eyebrow' | translate }}</p>
    <h1 id="home-title">{{ 'home.title' | translate }}</h1>
    <p class="intro">
      {{ 'home.intro' | translate }}
    </p>
  </section>

  <section [attr.aria-label]="'home.roomActions' | translate" class="room-actions">
    <app-create-room
      [disabled]="pendingAction !== null"
      [loading]="pendingAction === 'create'"
      (createRoomRequested)="createRoom($event)"
    />

    <app-join-room
      [disabled]="pendingAction !== null"
      [loading]="pendingAction === 'join'"
      (joinRoomRequested)="joinRoom($event)"
    />

    @if (errorMessage) {
      <p class="form-error" role="alert">{{ errorMessage }}</p>
    }
  </section>
</main>
